<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.C | Najjača Škvadra</title>
    <!-- SEO Best Practices applied -->
    <meta name="description" content="Službena stranica 4.C razreda iz Ruđera. Upoznajte našu škvadru, uspomene i provale. Skeniraj QR kod i baci oko!">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- GSAP for more JS animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="dark">
    <!-- Loader -->
    <div id="loader">
        <div class="loader-text glitch" data-text="Brijemo...">Brijemo...</div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Navigation -->
    <nav class="glass-nav" id="main-nav">
        <div class="logo">4.<span>C</span></div>
        <ul class="nav-links">
            <li><a href="#home">Start</a></li>
            <li><a href="#incidents">Incidenti</a></li>
        </ul>
        <button id="toggleTheme" class="theme-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        <div class="hamburger">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <!-- Hero Section -->
    <header id="home" class="hero">
        <div class="hero-content">
            <h1 class="glitch" data-text="4.C">4.C</h1>
            <h2 class="neon-text" data-text="Tehnička škola Ruđera Boškovića">Tehnička škola Ruđera Boškovića</h2>
            <p class="subtitle">Kaj ima? Dobrodošli u naš svijet. Najjači razred ikad buraz.</p>
            <a href="#incidents" class="btn-glow">Baci oko <i class="fas fa-arrow-down"></i></a>
        </div>
        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
            <div class="arrows">
                <span class="a1"></span>
                <span class="a2"></span>
                <span class="a3"></span>
            </div>
        </div>
    </header>

    <!-- Incidents Section -->
    <section id="incidents" class="section hidden">
        <div class="container">
            <h2 class="section-title">Naši <span>Incidenti</span></h2>
            <div class="incidents-grid" id="incidents-container">
                <!-- Incidents will be injected here by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <h2>Zauvijek <span>4.C</span></h2>
            <p>Složeno s ponosom. Ekipa koja ostavlja trag, kužiš.</p>
            <div class="socials">
                <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            </div>
            <p class="copyright">&copy; 2026 4.C Razred Ruđer. Sva prava pridržana legendo.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
